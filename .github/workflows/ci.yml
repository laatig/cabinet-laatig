name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  typecheck-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: npx tsc --noEmit
        working-directory: server

  typecheck-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npx tsc --noEmit
        working-directory: client

  build:
    runs-on: ubuntu-latest
    needs: [typecheck-server, typecheck-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: npx tsc
        working-directory: server
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm ci
        working-directory: .
      - run: npm run build
        working-directory: .
